<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lecture AI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f0; color: #1a1a18; height: 100vh; display: flex; flex-direction: column; }

  header { background: #fff; border-bottom: 1px solid #e0dfd8; padding: 12px 20px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 16px; font-weight: 600; }
  #session-select { border: 1px solid #d0cfc8; border-radius: 6px; padding: 6px 10px; font-size: 14px; background: #fff; }

  .layout { display: flex; flex: 1; overflow: hidden; }

  /* 左側逐字稿 */
  .transcript-panel { width: 45%; border-right: 1px solid #e0dfd8; display: flex; flex-direction: column; background: #fff; }
  .panel-header { padding: 14px 16px; font-size: 13px; font-weight: 600; color: #555; border-bottom: 1px solid #f0efe8; display: flex; justify-content: space-between; align-items: center; }
  #transcript-list { flex: 1; overflow-y: auto; padding: 12px; }
  .segment { padding: 10px 12px; border-radius: 8px; margin-bottom: 6px; cursor: pointer; border: 1px solid transparent; transition: background 0.15s; }
  .segment:hover { background: #f5f4ee; }
  .segment.active { background: #eef3ff; border-color: #c5d4f5; }
  .segment-time { font-size: 11px; color: #888; margin-bottom: 3px; }
  .segment-text { font-size: 14px; line-height: 1.6; }
  .segment-lang { font-size: 10px; color: #aaa; margin-top: 2px; }
  .empty-state { text-align: center; color: #aaa; padding: 40px 20px; font-size: 14px; }

  /* 右側問答 */
  .chat-panel { flex: 1; display: flex; flex-direction: column; background: #fafaf6; }
  #chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; }
  .msg.user { align-self: flex-end; background: #4f6ef7; color: #fff; border-bottom-right-radius: 4px; }
  .msg.ai { align-self: flex-start; background: #fff; border: 1px solid #e8e7e0; border-bottom-left-radius: 4px; }
  .msg.ai .sources { margin-top: 8px; padding-top: 8px; border-top: 1px solid #f0efe8; }
  .source-item { font-size: 11px; color: #888; padding: 2px 0; }
  .msg.loading { color: #aaa; font-style: italic; }

  .chat-input-area { padding: 12px 16px; border-top: 1px solid #e8e7e0; background: #fff; display: flex; gap: 8px; align-items: flex-end; }
  #session-filter { font-size: 12px; color: #888; padding: 4px 0; }
  textarea { flex: 1; border: 1px solid #d0cfd8; border-radius: 8px; padding: 8px 12px; font-size: 14px; resize: none; font-family: inherit; max-height: 120px; line-height: 1.5; }
  textarea:focus { outline: none; border-color: #4f6ef7; }
  button#send-btn { background: #4f6ef7; color: #fff; border: none; border-radius: 8px; padding: 8px 16px; font-size: 14px; cursor: pointer; white-space: nowrap; }
  button#send-btn:hover { background: #3a5ce0; }
  button#send-btn:disabled { background: #c0c7f0; cursor: not-allowed; }
</style>
</head>
<body>

<header>
  <h1>🎓 Lecture AI</h1>
  <select id="session-select"><option value="">-- 選擇錄音 --</option></select>
  <span style="font-size:13px;color:#888;margin-left:auto" id="status">就緒</span>
</header>

<div class="layout">
  <!-- 逐字稿 -->
  <div class="transcript-panel">
    <div class="panel-header">
      <span>逐字稿</span>
      <span id="seg-count" style="font-weight:400;color:#aaa"></span>
    </div>
    <div id="transcript-list">
      <div class="empty-state">請先選擇上方的錄音 Session</div>
    </div>
  </div>

  <!-- 問答 -->
  <div class="chat-panel">
    <div class="panel-header">
      AI 問答
      <span id="session-filter" style="font-weight:400"></span>
    </div>
    <div id="chat-messages">
      <div class="msg ai">你好！選擇一個 Session 後，就可以問我關於那堂課的任何問題 📚</div>
    </div>
    <div class="chat-input-area">
      <textarea id="question-input" rows="1" placeholder="問關於課堂的問題..."></textarea>
      <button id="send-btn">送出</button>
    </div>
  </div>
</div>

<script>
const API = "http://localhost:8000";
let currentSession = null;

// 載入 sessions
async function loadSessions() {
  const res = await fetch(`${API}/sessions`);
  const data = await res.json();
  const sel = document.getElementById("session-select");
  data.sessions.forEach(s => {
    const opt = document.createElement("option");
    opt.value = s; opt.textContent = s;
    sel.appendChild(opt);
  });
}

// 載入逐字稿
async function loadTranscript(sessionId) {
  document.getElementById("transcript-list").innerHTML = "<div class='empty-state'>載入中...</div>";
  const res = await fetch(`${API}/transcript/${sessionId}`);
  const data = await res.json();
  const list = document.getElementById("transcript-list");
  
  if (!data.segments.length) {
    list.innerHTML = "<div class='empty-state'>這個 Session 還沒有逐字稿</div>";
    return;
  }

  document.getElementById("seg-count").textContent = `${data.segments.length} 段`;
  list.innerHTML = "";
  data.segments.forEach(seg => {
    const div = document.createElement("div");
    div.className = "segment";
    const mins = Math.floor(seg.start_sec / 60);
    const secs = Math.floor(seg.start_sec % 60);
    div.innerHTML = `
      <div class="segment-time">${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}</div>
      <div class="segment-text">${seg.text}</div>
      <div class="segment-lang">${seg.language || ''} · 信心 ${(seg.confidence * 100).toFixed(0)}%</div>
    `;
    div.onclick = () => {
      document.querySelectorAll(".segment").forEach(s => s.classList.remove("active"));
      div.classList.add("active");
      // 把這段文字帶入問題框
      document.getElementById("question-input").value = `請解釋這段內容：「${seg.text.slice(0, 50)}...」`;
    };
    list.appendChild(div);
  });
}

// 送出問題
async function sendQuestion() {
  const input = document.getElementById("question-input");
  const q = input.value.trim();
  if (!q) return;

  const msgs = document.getElementById("chat-messages");
  
  // 顯示使用者訊息
  msgs.innerHTML += `<div class="msg user">${escHtml(q)}</div>`;
  msgs.innerHTML += `<div class="msg loading" id="loading-msg">思考中...</div>`;
  input.value = "";
  msgs.scrollTop = msgs.scrollHeight;
  document.getElementById("send-btn").disabled = true;

  try {
    const res = await fetch(`${API}/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question: q, session_id: currentSession || null })
    });
    const data = await res.json();
    
    document.getElementById("loading-msg")?.remove();

    let sourcesHtml = "";
    if (data.sources?.length) {
      sourcesHtml = `<div class="sources">${data.sources.map(s => {
        const m = Math.floor(s.start_sec/60), sec = Math.floor(s.start_sec%60);
        return `<div class="source-item">📍 ${s.session_id} ${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')} — ${escHtml(s.text_preview)}</div>`;
      }).join("")}</div>`;
    }

    msgs.innerHTML += `<div class="msg ai">${escHtml(data.answer).replace(/\n/g,"<br>")}${sourcesHtml}</div>`;
  } catch(e) {
    document.getElementById("loading-msg")?.remove();
    msgs.innerHTML += `<div class="msg ai" style="color:#c00">連線失敗，請確認 API 伺服器是否啟動。</div>`;
  }

  msgs.scrollTop = msgs.scrollHeight;
  document.getElementById("send-btn").disabled = false;
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// 事件
document.getElementById("session-select").addEventListener("change", e => {
  currentSession = e.target.value || null;
  document.getElementById("session-filter").textContent = currentSession ? `篩選: ${currentSession}` : "搜尋所有錄音";
  if (currentSession) loadTranscript(currentSession);
});

document.getElementById("send-btn").addEventListener("click", sendQuestion);
document.getElementById("question-input").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendQuestion(); }
});

// 自動調整 textarea 高度
document.getElementById("question-input").addEventListener("input", function() {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 120) + "px";
});

loadSessions();
</script>
</body>
</html>
